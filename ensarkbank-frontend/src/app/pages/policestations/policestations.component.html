<div class="page-container">
  @if (loading()) {
    <app-loading message="Loading police stations..." />
  }

  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Police Stations</h1>
      <p class="page-subtitle">{{ filteredItems().length }} total police stations</p>
    </div>
    @if (canManage()) {
      <button class="btn btn-primary" (click)="openAddForm()">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
        </svg>
        Add Police Station
      </button>
    }
  </div>

  <div class="table-card">
    <app-data-table
      [columns]="columns"
      [data]="filteredItems()"
      [searchable]="true"
      [paginated]="true"
      [pageSize]="10"
      emptyMessage="No police stations found"
      (action)="onAction($event)"
    />
  </div>
</div>

@if (showModal()) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">{{ editMode() ? 'Edit Police Station' : 'Add New Police Station' }}</h2>
        <button class="close-btn" (click)="closeModal()">
          <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Division *</label>
            <select class="form-select" [(ngModel)]="formDivisionId" (ngModelChange)="onDivisionChange()">
              <option [value]="0">Select division</option>
              @for (div of divisions(); track div.id) {
                <option [value]="div.id">{{ div.name }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">District *</label>
            <select class="form-select" [(ngModel)]="formDistrictId" [disabled]="!formDivisionId">
              <option [value]="0">Select district</option>
              @for (dist of districts(); track dist.id) {
                <option [value]="dist.id">{{ dist.name }}</option>
              }
            </select>
          </div>
        </div>
        <div class="form-group" style="margin-top: 16px;">
          <label class="form-label">Police Station Name *</label>
          <input type="text" class="form-input" [(ngModel)]="formName" placeholder="Enter police station name" />
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="onSubmit()" [disabled]="submitting()">
          @if (submitting()) { <span class="spinner"></span> }
          {{ editMode() ? 'Update' : 'Create' }}
        </button>
      </div>
    </div>
  </div>
}

<app-confirm-dialog
  [show]="showConfirm()"
  title="Delete Police Station"
  [message]="'Are you sure you want to delete ' + (selectedItem()?.name || '') + '? This action cannot be undone.'"
  confirmText="Delete"
  cancelText="Cancel"
  type="danger"
  (confirmed)="onDeleteConfirmed()"
  (cancelled)="showConfirm.set(false)"
/>
