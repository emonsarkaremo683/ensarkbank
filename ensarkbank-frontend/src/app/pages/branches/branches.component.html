<div class="page-container">
  @if (loading()) {
    <app-loading message="Loading branches..." />
  }

  <div class="page-header">
    <div class="header-left">
      <h1 class="page-title">Branches</h1>
      <p class="page-subtitle">{{ filteredBranches().length }} total branches</p>
    </div>
    @if (canManage()) {
      <button class="btn btn-primary" (click)="openAddForm()">
        <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
          <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd"/>
        </svg>
        Add Branch
      </button>
    }
  </div>

  <div class="table-card">
    <app-data-table
      [columns]="columns"
      [data]="filteredBranches()"
      [searchable]="true"
      [paginated]="true"
      [pageSize]="10"
      emptyMessage="No branches found"
      (action)="onAction($event)"
    />
  </div>
</div>

@if (showModal()) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-container" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h2 class="modal-title">{{ editMode() ? 'Edit Branch' : 'Add New Branch' }}</h2>
        <button class="close-btn" (click)="closeModal()">
          <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd"/>
          </svg>
        </button>
      </div>

      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Branch Name *</label>
            <input type="text" class="form-input" [(ngModel)]="form.name" placeholder="Enter branch name" />
          </div>

          @if (editMode()) {
            <div class="form-group">
              <label class="form-label">Branch Code</label>
              <input type="text" class="form-input form-input-readonly" [value]="form.branchCode" readonly />
            </div>
          }

          <div class="form-group">
            <label class="form-label">Branch Type *</label>
            <select class="form-select" [(ngModel)]="form.type" [disabled]="editMode()">
              <option value="">Select type</option>
              @for (type of branchTypes; track type) {
                <option [value]="type">{{ type }}</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Status *</label>
            <select class="form-select" [(ngModel)]="form.status">
              <option value="ACTIVE">Active</option>
              <option value="CLOSED">Closed</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Email *</label>
            <input type="email" class="form-input" [(ngModel)]="form.email" placeholder="branch@example.com" />
          </div>
          <div class="form-group">
            <label class="form-label">Phone *</label>
            <input type="text" class="form-input" [(ngModel)]="form.phoneNumber" placeholder="Phone number" />
          </div>
        </div>

        <div class="section-divider">
          <h3 class="section-label">Address</h3>
        </div>

        <div class="form-group">
          <label class="form-label">Address</label>
          <input type="text" class="form-input" [(ngModel)]="form.address" placeholder="Full address" />
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="onSubmit()" [disabled]="submitting()">
          @if (submitting()) {
            <span class="spinner"></span>
          }
          {{ editMode() ? 'Update Branch' : 'Create Branch' }}
        </button>
      </div>
    </div>
  </div>
}

<app-confirm-dialog
  [show]="showConfirm()"
  title="Delete Branch"
  [message]="'Are you sure you want to delete ' + (selectedBranch()?.name || '') + '? This action cannot be undone.'"
  confirmText="Delete"
  cancelText="Cancel"
  type="danger"
  (confirmed)="onDeleteConfirmed()"
  (cancelled)="showConfirm.set(false)"
/>
