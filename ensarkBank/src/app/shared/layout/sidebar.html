<nav class="sidebar" [class.collapsed]="!isOpen()">
  <div class="sidebar-header">
    <div class="logo">
      <span class="logo-icon">🏦</span>
      @if (isOpen()) {
        <span class="logo-text">Ensark Bank</span>
      }
    </div>
    <button class="toggle-btn" (click)="toggleSidebar()" title="Toggle Sidebar">
      {{ isOpen() ? '❮' : '❯' }}
    </button>
  </div>

  @if (isOpen()) {
    <div class="user-info">
      <div class="user-avatar">{{ userName()[0] || '?' }}</div>
      <div class="user-details">
        <span class="user-name">{{ userName() || 'User' }}</span>
        <span class="user-role">{{ role()?.replace('_', ' ') || '' }}</span>
      </div>
    </div>
  }

  <ul class="nav-menu">
    @for (item of visibleNavItems(); track item.path) {
      <li class="nav-item">
        <a
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: item.path === '/' }"
          class="nav-link"
          [title]="item.label"
        >
          <span class="nav-icon">{{ item.icon }}</span>
          @if (isOpen()) {
            <span class="nav-label">{{ item.label }}</span>
          }
        </a>
      </li>
    }
  </ul>

  <div class="sidebar-footer">
    <button class="logout-btn" (click)="logout()" title="Logout">
      <span class="nav-icon">🚪</span>
      @if (isOpen()) {
        <span class="nav-label">Logout</span>
      }
    </button>
  </div>
</nav>
