<div class="page-header">
  <h1 class="page-title">New Account</h1>
  <a routerLink="/accounts" class="btn btn-outline">← Back</a>
</div>

@if (error()) {
  <div class="alert alert-danger">{{ error() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" #accountForm="ngForm">
    <h3 class="section-title">Account Details</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Branch *</label>
        <select [(ngModel)]="account.branchId" name="branchId" required class="form-control">
          <option [value]="0">Select Branch</option>
          @for (b of branches(); track b.id) { <option [value]="b.id">{{ b.name }}</option> }
        </select>
      </div>
      <div class="form-group">
        <label>Account Type *</label>
        <select [(ngModel)]="account.accountType" name="accountType" required class="form-control">
          @for (t of accountTypes; track t) { <option [value]="t">{{ t }}</option> }
        </select>
      </div>
      <div class="form-group">
        <label>Initial Balance *</label>
        <input type="number" [(ngModel)]="account.availableBalance" name="balance" required class="form-control" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Status *</label>
        <select [(ngModel)]="account.accountStatus" name="status" required class="form-control">
          @for (s of accountStatuses; track s) { <option [value]="s">{{ s }}</option> }
        </select>
      </div>
    </div>

    <h3 class="section-title">Account Holders</h3>
    @for (holder of account.accountHolders; track $index; let i = $index) {
      <div class="repeatable-block">
        <div class="block-header">
          <span>Holder {{ i + 1 }}</span>
          @if (account.accountHolders.length > 1) {
            <button type="button" class="btn btn-sm btn-danger" (click)="removeHolder(i)">Remove</button>
          }
        </div>
        <div class="form-grid">
          <div class="form-group">
            <label>Customer *</label>
            <select [(ngModel)]="holder.customerId" [name]="'cust' + i" required class="form-control">
              <option [ngValue]="0">Select Customer</option>
              @for (c of customers(); track c.id) {
                <option [ngValue]="c.id">{{ c.name }} ({{ c.email }})</option>
              }
            </select>
          </div>
          <div class="form-group">
            <label>Holder Type *</label>
            <select [(ngModel)]="holder.holderType" [name]="'hType' + i" required class="form-control">
              @for (ht of holderTypes; track ht) { <option [value]="ht">{{ ht }}</option> }
            </select>
          </div>
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" [(ngModel)]="holder.canWithdraw" [name]="'canW' + i">
              Can Withdraw
            </label>
          </div>
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" [(ngModel)]="holder.canDeposit" [name]="'canD' + i">
              Can Deposit
            </label>
          </div>
          <div class="form-group checkbox-group">
            <label>
              <input type="checkbox" [(ngModel)]="holder.canApproveTransaction" [name]="'canA' + i">
              Can Approve Transaction
            </label>
          </div>
        </div>
      </div>
    }
    <button type="button" class="btn btn-outline btn-sm mb-3" (click)="addHolder()">+ Add Holder</button>

    <h3 class="section-title">Nominee Information</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Nominee Name *</label>
        <input type="text" [(ngModel)]="account.n_name" name="n_name" required class="form-control">
      </div>
      <div class="form-group">
        <label>Nominee Email</label>
        <input type="email" [(ngModel)]="account.n_email" name="n_email" class="form-control">
      </div>
      <div class="form-group">
        <label>Nominee Phone</label>
        <input type="text" [(ngModel)]="account.n_phone" name="n_phone" class="form-control">
      </div>
      <div class="form-group">
        <label>Nominee Photo *</label>
        <input type="file" accept="image/*" class="form-control" (change)="onFileChange($event, 'photo')">
      </div>
      <div class="form-group">
        <label>NID Front *</label>
        <input type="file" accept="image/*" class="form-control" (change)="onFileChange($event, 'nidFront')">
      </div>
      <div class="form-group">
        <label>NID Back *</label>
        <input type="file" accept="image/*" class="form-control" (change)="onFileChange($event, 'nidBack')">
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !accountForm.valid">
        {{ loading() ? 'Creating...' : 'Create Account' }}
      </button>
      <a routerLink="/accounts" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
