<div class="page-header">
  <h1 class="page-title">{{ isEdit() ? 'Edit ATM' : 'New ATM' }}</h1>
  <a routerLink="/atms" class="btn btn-outline">← Back</a>
</div>

@if (error()) {
  <div class="alert alert-error">{{ error() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" #atmForm="ngForm">
    <div class="form-grid">
      <div class="form-group">
        <label>Branch *</label>
        <select [(ngModel)]="atm.branchId" name="branchId" required class="form-control">
          <option [ngValue]="0">Select Branch</option>
          @for (b of branches(); track b.id) {
            <option [ngValue]="b.id">{{ b.name }} - {{ b.branchCode }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Status *</label>
        <select [(ngModel)]="atm.status" name="status" required class="form-control">
          @for (s of statuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Address *</label>
        <input type="text" [(ngModel)]="atm.address" name="address" required class="form-control" placeholder="ATM location address">
      </div>
      <div class="form-group">
        <label>Balance *</label>
        <input type="number" [(ngModel)]="atm.balance" name="balance" required class="form-control" min="0" step="0.01">
      </div>
      <div class="form-group">
        <label>Limit *</label>
        <input type="number" [(ngModel)]="atm.limit" name="limit" required class="form-control" min="0" step="0.01">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !atmForm.valid">
        {{ loading() ? 'Saving...' : (isEdit() ? 'Update ATM' : 'Create ATM') }}
      </button>
      <a routerLink="/atms" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
