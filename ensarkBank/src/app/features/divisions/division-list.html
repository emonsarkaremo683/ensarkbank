<div class="page-header">
  <h1 class="page-title">Divisions</h1>
</div>

@if (error()) {
  <div class="alert alert-error">{{ error() }}</div>
}

<div class="form-card">
  <div class="add-row">
    <input type="text" [ngModel]="newDivisionName()" (ngModelChange)="newDivisionName.set($event)"
           class="form-control" placeholder="Enter division name">
    <button class="btn btn-primary" (click)="addDivision()" [disabled]="!newDivisionName()">+ Add Division</button>
  </div>
</div>

@if (loading()) {
  <div class="loading">Loading...</div>
} @else {
  <div class="table-card">
    <table class="data-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Name</th>
          <th>Districts</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        @for (div of divisions(); track div.id) {
          <tr>
            <td>{{ div.id }}</td>
            <td><strong>{{ div.name }}</strong></td>
            <td>{{ getDistrictByDivisionId(div.id).length || 0 }} districts</td>
            <td>
              <button class="btn btn-sm btn-danger" (click)="deleteDivision(div.id!)">Delete</button>
            </td>
          </tr>
        } @empty {
          <tr><td colspan="4" class="empty-state">No divisions found</td></tr>
        }
      </tbody>
    </table>
  </div>
}
