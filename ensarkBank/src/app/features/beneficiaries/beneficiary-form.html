<div class="page-header">
  <h1 class="page-title">New Beneficiary</h1>
  <a routerLink="/beneficiaries" class="btn btn-outline">← Back</a>
</div>

@if (error()) {
  <div class="alert alert-error">{{ error() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" #benForm="ngForm">
    <div class="form-grid">
      <div class="form-group">
        <label>Customer *</label>
        <select [(ngModel)]="beneficiary.customerId" name="customerId" required class="form-control">
          <option [value]="0">Select Customer</option>
          @for (c of customers(); track c.email) {
            <option [value]="c.id">{{ c.name }} ({{ c.email }})</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Account Number *</label>
        <input type="text" [(ngModel)]="beneficiary.accNumber" name="accNumber" required class="form-control">
      </div>
      <div class="form-group">
        <label>Name *</label>
        <input type="text" [(ngModel)]="beneficiary.name" name="name" required class="form-control">
      </div>
      <div class="form-group">
        <label>Provider *</label>
        <input type="text" [(ngModel)]="beneficiary.provider" name="provider" required class="form-control" placeholder="e.g. bKash, Nagad, Bank Name">
      </div>
      <div class="form-group">
        <label>Type *</label>
        <select [(ngModel)]="beneficiary.beneficiaryType" name="type" required class="form-control">
          @for (bt of beneficiaryTypes; track bt) { <option [value]="bt">{{ bt }}</option> }
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !benForm.valid">
        {{ loading() ? 'Creating...' : 'Create Beneficiary' }}
      </button>
      <a routerLink="/beneficiaries" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
