<div class="page-header">
  <h1 class="page-title">New Employee</h1>
  <a routerLink="/employees" class="btn btn-outline">← Back</a>
</div>

@if (error()) {
<div class="alert alert-error">{{ error() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" #empForm="ngForm">
    <h3 class="section-title">Personal Information</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Full Name *</label>
        <input type="text" [(ngModel)]="employee.name" name="name" required class="form-control">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="employee.email" name="email" required class="form-control">
      </div>
      <div class="form-group">
        <label>Password *</label>
        <input type="password" [(ngModel)]="employee.password" name="password" required class="form-control">
      </div>
      <div class="form-group">
        <label>Phone *</label>
        <input type="text" [(ngModel)]="employee.phone" name="phone" required class="form-control">
      </div>
      <div class="form-group">
        <label>Gender *</label>
        <select [(ngModel)]="employee.gender" name="gender" required class="form-control">
          @for (g of genders; track g) { <option [value]="g">{{ g }}</option> }
        </select>
      </div>
      <div class="form-group">
        <label>Date of Birth *</label>
        <input type="date" [(ngModel)]="employee.dob" name="dob" required class="form-control">
      </div>
      <div class="form-group">
        <label>Profile Image</label>
        <input type="file" class="form-control" accept="image/*" (change)="handleProfileFile($event)" />
      </div>
    </div>

    <h3 class="section-title">Employment Details</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Branch *</label>
        <select [(ngModel)]="employee.branchId" name="branchId" required class="form-control">
          <option [value]="0">Select Branch</option>
          @for (b of branches(); track b.id) { <option [value]="b.id">{{ b.name }}</option> }
        </select>
      </div>
      <div class="form-group">
        <label>Designation *</label>
        <select [(ngModel)]="employee.designation" name="designation" required class="form-control">
          @for (d of designations; track d) { <option [value]="d">{{ d }}</option> }
        </select>
      </div>
      <div class="form-group">
        <label>Role *</label>
        <select [(ngModel)]="employee.role" name="role" required class="form-control">
          @for (r of roles; track r) { <option [value]="r">{{ r }}</option> }
        </select>
      </div>
    </div>

    <h3 class="section-title">Addresses</h3>
    <div class="form-check mb-3">
      <input class="form-check-input" type="checkbox" id="sameAddress" [checked]="sameAddress()"
        (change)="toggleSameAddress()" />
      <label class="form-check-label" for="sameAddress">Present and permanent address are the same</label>
    </div>

    @for (addr of employee.addresses; track $index; let i = $index) {
    <div class="repeatable-block">
      <div class="block-header">
        <span>{{ addr.addressType === 'PRESENT' ? 'Present' : 'Permanent' }} Address</span>
        @if (employee.addresses.length > 1) {
        <button type="button" class="btn btn-sm btn-danger" (click)="removeAddress(i)">Remove</button>
        }
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label>Holding No</label>
          <input type="text" [(ngModel)]="addr.holdingNo" [name]="'hNo' + i" class="form-control">
        </div>
        <div class="form-group">
          <label>Area</label>
          <input type="text" [(ngModel)]="addr.area" [name]="'area' + i" class="form-control">
        </div>
        <div class="form-group">
          <label>Postal Code</label>
          <input type="text" [(ngModel)]="addr.postalCode" [name]="'pCode' + i" class="form-control">
        </div>
        <div class="form-group">
          <label>Division</label>
          <select [(ngModel)]="addr.divisionId" [name]="'division' + i" class="form-control"
            (ngModelChange)="onDivisionChange(i, $event)">

            <option [ngValue]="0">Select Division</option>

            @for (div of divisions(); track div.id) {
            <option [ngValue]="div.id">
              {{ div.name }}
            </option>
            }
          </select>
        </div>
        <div class="form-group">
          <label>District</label>
          <select [(ngModel)]="addr.districtId" [name]="'district' + i" class="form-control"
            (ngModelChange)="onDistrictChange(i, $event)">

            <option [ngValue]="0">Select District</option>

            @for (dist of getDistrictsForAddress(addr); track dist.id) {
            <option [ngValue]="dist.id">
              {{ dist.name }}
            </option>
            }
          </select>
        </div>
        <div class="form-group">
          <label>Police Station</label>
          <select [(ngModel)]="addr.policeStationId" [name]="'ps' + i" class="form-control"
            (ngModelChange)="onPoliceStationChange(i, $event)">

            <option [ngValue]="0">Select Police Station</option>

            @for (ps of getPoliceStationsForAddress(addr); track ps.id) {
            <option [ngValue]="ps.id">
              {{ ps.name }}
            </option>
            }
          </select>
        </div>
      </div>
    </div>
    }

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !empForm.valid">
        {{ loading() ? 'Creating...' : 'Create Employee' }}
      </button>
      <a routerLink="/employees" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
