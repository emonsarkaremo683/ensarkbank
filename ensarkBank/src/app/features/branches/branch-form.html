<div class="page-header">
  <h1 class="page-title">{{ isEdit() ? 'Edit Branch' : 'New Branch' }}</h1>
  <a routerLink="/branches" class="btn btn-outline">← Back</a>
</div>

@if (error()) {
  <div class="alert alert-error">{{ error() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" #branchForm="ngForm">
    <div class="form-grid">
      <div class="form-group">
        <label>Branch Name *</label>
        <input type="text" [(ngModel)]="branch.name" name="name" required class="form-control" placeholder="e.g. Dhaka Main">
      </div>
      <div class="form-group">
        <label>Email *</label>
        <input type="email" [(ngModel)]="branch.email" name="email" required class="form-control" placeholder="branch@ensarbank.com">
      </div>
      <div class="form-group">
        <label>Phone Number *</label>
        <input type="text" [(ngModel)]="branch.phoneNumber" name="phoneNumber" required class="form-control" placeholder="+8801XXXXXXXXX">
      </div>
      <div class="form-group">
        <label>Address *</label>
        <input type="text" [(ngModel)]="branch.address" name="address" required class="form-control" placeholder="Full address">
      </div>
      <div class="form-group">
        <label>Branch Type *</label>
        <select [(ngModel)]="branch.type" name="type" required class="form-control">
          @for (t of branchTypes; track t) {
            <option [value]="t">{{ t }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Status *</label>
        <select [(ngModel)]="branch.status" name="status" required class="form-control">
          @for (s of branchStatuses; track s) {
            <option [value]="s">{{ s }}</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Police Station</label>
        <select [(ngModel)]="branch.policeStation" name="policeStation" class="form-control">
          <option [ngValue]="undefined">Select Police Station</option>
          @for (ps of policeStations(); track ps.id) {
            <option [ngValue]="{ id: ps.id }">{{ ps.name }}</option>
          }
        </select>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !branchForm.valid">
        {{ loading() ? 'Saving...' : (isEdit() ? 'Update Branch' : 'Create Branch') }}
      </button>
      <a routerLink="/branches" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
