<div class="page-header">
  <h1 class="page-title">New Transfer</h1>
  <a routerLink="/transactions" class="btn btn-outline">← Back</a>
</div>

@if (error()) {
  <div class="alert alert-error">{{ error() }}</div>
}

@if (success()) {
  <div class="alert alert-success">{{ success() }}</div>
}

<div class="form-card">
  <form (ngSubmit)="onSubmit()" #txForm="ngForm">
    <h3 class="section-title">Transfer Details</h3>
    <div class="form-grid">
      <div class="form-group">
        <label>Sender Account *</label>
        <select [(ngModel)]="transfer.senderId" name="senderId" required class="form-control">
          <option [value]="0">Select Sender</option>
          @for (a of accounts(); track a.accountNumber) {
            <option [value]="a.accountNumber">{{ a.accountNumber }} - {{ a.branchName }} ({{ a.availableBalance | number:'1.2-2' }})</option>
          }
        </select>
      </div>
      <div class="form-group">
        <label>Receiver Account Number *</label>
        <input type="text" [(ngModel)]="transfer.receiverAccountNumber" name="receiverAcct" required class="form-control">
      </div>
      <div class="form-group">
        <label>Receiver Name *</label>
        <input type="text" [(ngModel)]="transfer.receiverName" name="receiverName" required class="form-control">
      </div>
      <div class="form-group">
        <label>Bank Name</label>
        <input type="text" [(ngModel)]="transfer.bankName" name="bankName" class="form-control">
      </div>
      <div class="form-group">
        <label>Amount *</label>
        <input type="number" [(ngModel)]="transfer.request.amount" name="amount" required class="form-control" min="0.01" step="0.01">
      </div>
      <div class="form-group">
        <label>Channel *</label>
        <select [(ngModel)]="transfer.request.channel" name="channel" required class="form-control">
          @for (c of channels; track c) { <option [value]="c">{{ c }}</option> }
        </select>
      </div>
      <div class="form-group full-width">
        <label>Remarks</label>
        <input type="text" [(ngModel)]="transfer.request.remarks" name="remarks" class="form-control" placeholder="Transfer description">
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary" [disabled]="loading() || !txForm.valid">
        {{ loading() ? 'Processing...' : 'Send Transfer' }}
      </button>
      <a routerLink="/transactions" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
